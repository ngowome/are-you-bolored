<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Are you Bolloré'd ?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
</head>
<body class="bg-slate-50 p-10 text-center">
    <h1 class="text-4xl font-bold mb-6">Are you Bolloré'd ?</h1>
    <input id="barreRecherche" placeholder="Rechercher..." class="border p-2 rounded">
    <button onclick="lancerRecherche()" class="bg-red-500 text-white p-2 rounded">Vérifier</button>
    <div id="zoneResultat" class="mt-6"></div>

    <script>
        // C'est ici que tu dois définir la variable baseDeDonnees
        const baseDeDonnees = [
            {"n": "Canal+", "aliases": ["canal plus", "canal+"], "type": "media", "description": "Groupe audiovisuel.", "chain": ["Canal+", "Vivendi", "Bolloré SE"]},
            {"n": "Gameloft", "aliases": ["gameloft"], "type": "digital", "description": "Jeux vidéo.", "chain": ["Gameloft", "Vivendi", "Bolloré SE"]}
            // ... AJOUTE TOUT LE RESTE DE TA LISTE ICI EN SÉPARANT CHAQUE OBJET PAR UNE VIRGULE
        ];

        const moteurDeRecherche = new Fuse(baseDeDonnees, { keys: ['n', 'aliases'], threshold: 0.3 });

        function lancerRecherche() {
            const saisie = document.getElementById("barreRecherche").value.trim();
            const zoneResultat = document.getElementById("zoneResultat");
            const resultats = moteurDeRecherche.search(saisie);

            if (resultats.length > 0) {
                const cible = resultats[0].item;
                zoneResultat.innerHTML = `<div class="bg-red-100 p-4">Oui ! ${cible.n} appartient à Bolloré : ${cible.chain.join(" ➔ ")}</div>`;
            } else {
                zoneResultat.innerHTML = `<div class="bg-green-100 p-4">A priori non !</div>`;
            }
        }
    </script>
</body>
</html>
